workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build iOS
        script: |
          set -e
          flutter build ios --debug --no-codesign
          echo "Build done, listing output:"
          ls -la build/ios/iphoneos/
      - name: Package IPA
        script: |
          set -e
          rm -rf Payload unsigned.ipa
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r unsigned.ipa Payload
          rm -rf Payload
          echo "IPA size: $(ls -lh unsigned.ipa | awk '{print $5}')"
    artifacts:
      - unsigned.ipa
