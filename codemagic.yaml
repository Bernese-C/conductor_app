workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --debug --no-codesign
          echo "=== App bundle ==="
          ls build/ios/iphoneos/Runner.app/ | head -20
          echo "=== Camera permission ==="
          plutil -p build/ios/iphoneos/Runner.app/Info.plist | grep -i camera
      - name: Package IPA
        script: |
          rm -rf Payload unsigned.ipa
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -ry unsigned.ipa Payload
          rm -rf Payload
          echo "=== IPA ==="
          ls -lh unsigned.ipa
          file unsigned.ipa
    artifacts:
      - unsigned.ipa
